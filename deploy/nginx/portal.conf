# /etc/nginx/sites-available/portal
# (Symlinked from sites-enabled/portal by the provisioner.)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name portal.zenretreatspk.com _;

    root /var/www/zenretreats-portal/public;
    index index.php;

    charset utf-8;
    client_max_body_size 25M;

    # Security headers (TLS terminates at Cloudflare; HSTS comes from CF)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Trust Cloudflare forwarded headers (the Laravel TRUSTED_PROXIES handles the rest)
    real_ip_header CF-Connecting-IP;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Public health endpoint
    location = /up {
        try_files $uri /index.php?$query_string;
    }

    # Static asset cache (built by Vite)
    location ~* ^/build/.+\.(?:css|js|jpe?g|png|gif|ico|svg|woff2?|ttf|map)$ {
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # Deny dotfiles (except .well-known/)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Deny PHP execution in storage / uploads
    location ~ ^/storage/.*\.php$ {
        deny all;
    }
}
